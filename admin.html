<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Papelería Karol</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- LOGIN -->
<div class="loginBox" id="loginBox">

    <h1>🔐 Panel Admin</h1>

    <input type="text" id="usuario" placeholder="Usuario">
    <input type="password" id="password" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>

</div>

<!-- PANEL -->
<div id="panelAdmin" class="hidden">
    <div class="top-buttons">

  <button onclick="mostrarSeccion('menuAdmin')">
    🏠 Inicio
  </button>

  <button onclick="mostrarSeccion('panelProductos')">
    📦 Productos
  </button>

  <button onclick="mostrarSeccion('panelProveedores')">
    🏢 Proveedores
  </button>

  <button onclick="mostrarSeccion('panelFaltantes')">
    🚨 Faltantes
  </button>

  <button onclick="mostrarSeccion('panelHistorial')">
    📜 Historial
  </button>
<div id="panelProductos" class="adminSection hidden">

<h2>📦 Productos</h2>

<input id="prodCodigo" placeholder="Código">
<input id="prodDescripcion" placeholder="Descripción">

<button onclick="guardarProducto()">
Guardar producto
</button>

<div id="listaProductos"></div>

<button onclick="volverInicio()">
⬅️ Volver
</button>

</div>
</div>

    <h1>📊 PANEL ADMINISTRATIVO</h1>

    <!-- PRODUCTOS -->
    <div class="card">

        <h2>📦 Añadir Producto</h2>

        <input type="text" id="codigoProducto" placeholder="Código">
        <input type="text" id="descripcionProducto" placeholder="Descripción">

        <button onclick="guardarProducto()">
            Guardar Producto
        </button>

    </div>

    <!-- PROVEEDORES -->
    <div class="card">
<div class="card">

<h2>🏢 Añadir proveedor</h2>

<input id="codigoProveedor" placeholder="Código producto">

<input id="empresaProveedor" placeholder="Empresa">

<input id="nombreProveedor" placeholder="Nombre contacto">

<input id="rfcProveedor" placeholder="RFC">

<input id="telefonoProveedor" placeholder="Teléfono">

<input id="correoProveedor" placeholder="Correo">

<input id="direccionProveedor" placeholder="Dirección">

<select id="contratoProveedor">

  <option>1 mes</option>
  <option>6 meses</option>
  <option>1 año</option>
  <option>2 años</option>
  <option>5 años</option>

</select>

<button onclick="guardarProveedor()">
Guardar proveedor
</button>
<div id="panelFaltantes" class="adminSection hidden">

<h2>🚨 Registrar faltante</h2>

<input id="codigoFaltante" placeholder="Código">

<input id="descripcionArticulo" readonly>

<input id="nombreProveedorFaltante" readonly>

<input id="correoProveedorFaltante" readonly>

<input id="cantidadFaltante" type="number" placeholder="Cantidad">

<button onclick="registrarFaltante()">
Registrar faltante
</button>

<p id="mensajeFaltante"></p>

<button onclick="volverInicio()">
⬅️ Volver
</button>
<div id="panelHistorial" class="adminSection hidden">

<h2>📜 Historial faltantes</h2>

<div id="historialFaltantes"></div>

<button onclick="volverInicio()">
⬅️ Volver
</button>

</div>
</div>
</div>

    </div>

    <!-- LISTAS -->
    <div class="card">

        <h2>📋 Productos</h2>
        <div id="listaProductos"></div>

    </div>

    <div class="card">

        <h2>📋 Proveedores</h2>
        <div id="listaProveedores"></div>

    </div>

</div>
<div class="card">

  <h2>🚨 Faltantes</h2>

  <a href="faltantes.html">
    <button>
      Abrir módulo de faltantes
    </button>
  </a>

</div>
<script src="admin.js"></script>

</body>
</html>
